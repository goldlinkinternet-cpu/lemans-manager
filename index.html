<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>24h Le Mans — Multi-Team Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #030503; }
      input[type=color] { -webkit-appearance: none; border: none; cursor: pointer; }
      input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
      input[type=color]::-webkit-color-swatch { border: none; border-radius: 50%; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #030503; }
      ::-webkit-scrollbar-thumb { background: #1a7a00; border-radius: 3px; }
      .ei { opacity: 0 !important; }
      tr:hover .ei { opacity: 0.7 !important; }
      span:hover > .ei { opacity: 0.7 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
